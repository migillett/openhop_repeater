# Pre-commit hooks for mc_repeater
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3

repos:
  # Python-focused safety checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-ast
        files: ^.*\.py$
      - id: debug-statements
        files: ^.*\.py$
      - id: check-docstring-first
        files: ^.*\.py$
      - id: check-builtin-literals
        files: ^.*\.py$

  # Modern Python linting + import sorting + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: ^.*\.py$
      - id: ruff-format
        args: ["--check"]
        files: ^.*\.py$

  # Security-focused static analysis
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        # B104: intentional LAN listeners, B105: setup-required placeholder credentials.
        args: ["-q", "-l", "-i", "-s", "B104,B105"]
        files: ^.*\.py$
        exclude: ^tests/

  # Test suite gate
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
        types: [python]
